<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal - IA Programador Privado</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1117; color: #c9d1d9; margin: 0; padding: 20px; display: flex; justify-content: center; height: 100vh; box-sizing: border-box; }
        .main-container { width: 100%; max-width: 1000px; display: flex; flex-direction: column; background-color: #161b22; border-radius: 10px; border: 1px solid #30363d; overflow: hidden; }
        .header { background-color: #010409; padding: 15px 20px; border-bottom: 1px solid #30363d; display: flex; gap: 15px; align-items: center; }
        h2 { margin: 0; font-size: 1.2rem; color: #58a6ff; white-space: nowrap; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #30363d; background: #0d1117; color: #c9d1d9; font-family: monospace; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .msg { padding: 15px 20px; border-radius: 8px; max-width: 90%; line-height: 1.5; font-size: 15px; }
        .msg.user { background-color: #1f6feb; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.assistant { background-color: #21262d; border: 1px solid #30363d; align-self: flex-start; border-bottom-left-radius: 2px; width: 100%; box-sizing: border-box; }
        pre { background-color: #0d1117 !important; border: 1px solid #30363d; border-radius: 6px; padding: 15px; overflow-x: auto; margin: 10px 0; }
        code { font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; }
        p code { background-color: #30363d; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
        .input-area { padding: 20px; background-color: #010409; border-top: 1px solid #30363d; display: flex; gap: 10px; }
        textarea { flex: 1; padding: 15px; border-radius: 5px; border: 1px solid #30363d; background: #0d1117; color: #c9d1d9; resize: vertical; height: 60px; font-family: monospace; }
        button { background-color: #238636; color: white; border: none; padding: 0 25px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: #2ea043; }
        button:disabled { background-color: #21262d; color: #8b949e; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header">
            <h2>💻 Qwen Coder 14B (En Vivo)</h2>
            <input type="text" id="apiUrl" placeholder="Pega aquí el enlace de Ngrok...">
        </div>
        <div id="chat-box">
            <div class="msg assistant">Terminal lista. Esperando instrucciones de código...</div>
        </div>
        <div class="input-area">
            <textarea id="userInput" placeholder="Escribe tu instrucción..." onkeydown="handleEnter(event)"></textarea>
            <button onclick="enviarMensaje()" id="btnSend">Ejecutar</button>
        </div>
    </div>

    <script>
        // Configuración blindada para que no crashee al recibir código a medias
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    try {
                        return hljs.highlight(code, { language: lang }).value;
                    } catch (e) {}
                }
                try {
                    return hljs.highlightAuto(code).value;
                } catch (e) {}
                return code; // Si todo falla, devuelve el código en texto plano para no crashear
            },
            breaks: true
        });

        let historial = [];

        async function enviarMensaje() {
            let apiUrl = document.getElementById("apiUrl").value.trim();
            const userInput = document.getElementById("userInput");
            const btnSend = document.getElementById("btnSend");
            const texto = userInput.value.trim();

            if (!apiUrl) { alert("Falta el enlace del servidor Ngrok."); return; }
            if (!texto) return;

            if (apiUrl.endsWith("/")) apiUrl = apiUrl.slice(0, -1);

            // 1. Mostrar mensaje del usuario
            const chatBox = document.getElementById("chat-box");
            const divUser = document.createElement("div");
            divUser.className = "msg user";
            divUser.textContent = texto;
            chatBox.appendChild(divUser);
            
            userInput.value = "";
            btnSend.disabled = true;
            btnSend.textContent = "Pensando...";

            // 2. Crear caja vacía para la IA
            const divAssistant = document.createElement("div");
            divAssistant.className = "msg assistant";
            divAssistant.innerHTML = "<em>...</em>";
            chatBox.appendChild(divAssistant);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const respuesta = await fetch(apiUrl + "/chat", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "ngrok-skip-browser-warning": "69420",
                        "Bypass-Tunnel-Reminder": "true"
                    },
                    body: JSON.stringify({
                        historial: historial.slice(-8), 
                        nuevo_mensaje: texto
                    })
                });

                if (!respuesta.ok) throw new Error(`Error de servidor: ${respuesta.status}`);

                // 3. LA MAGIA DEL STREAMING EN VIVO
                const reader = respuesta.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let respuestaCompleta = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    respuestaCompleta += decoder.decode(value, { stream: true });
                    // Parseo seguro a medida que llega
                    divAssistant.innerHTML = marked.parse(respuestaCompleta);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }

                historial.push({ role: "user", content: texto });
                historial.push({ role: "assistant", content: respuestaCompleta });

            } catch (error) {
                divAssistant.innerHTML = "❌ Error de conexión. Revisa que el enlace de Ngrok sea correcto y que Colab esté encendido.";
                console.error(error);
            }

            btnSend.disabled = false;
            btnSend.textContent = "Ejecutar";
            userInput.focus();
        }

        function handleEnter(event) {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                enviarMensaje();
            }
        }
    </script>
</body>
</html>
