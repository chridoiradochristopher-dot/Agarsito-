<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Programador 14B</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .mensaje { max-width: 80%; padding: 10px 15px; border-radius: 8px; line-height: 1.5; }
        .user { align-self: flex-end; background-color: #0078d4; }
        .assistant { align-self: flex-start; background-color: #333; border: 1px solid #444; width: 100%; }
        
        /* Estilos para las cajas de código */
        .code-container { background-color: #0d0d0d; border-radius: 6px; margin: 10px 0; overflow: hidden; border: 1px solid #333; }
        .code-header { background-color: #2d2d2d; padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; font-size: 0.85em; color: #bbb; }
        .copy-btn { background-color: #444; border: none; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.9em; transition: 0.2s; }
        .copy-btn:hover { background-color: #666; }
        .copy-btn.copied { background-color: #28a745; }
        pre { margin: 0; padding: 15px; overflow-x: auto; color: #d4d4d4; font-family: Consolas, monospace; }

        /* Etiquetas de pensamiento */
        .pensamiento { color: #888; font-style: italic; font-size: 0.9em; border-left: 3px solid #555; padding-left: 10px; margin-bottom: 10px; }

        #input-container { padding: 20px; background-color: #252526; display: flex; gap: 10px; border-top: 1px solid #333; }
        #user-input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #444; background-color: #1e1e1e; color: white; font-size: 1em; }
        #send-btn { padding: 12px 20px; background-color: #0078d4; border: none; border-radius: 5px; color: white; cursor: pointer; font-weight: bold; }
        #send-btn:hover { background-color: #005a9e; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div class="mensaje assistant">¡Hola! Soy tu Ingeniero de Software Senior (Qwen 14B). ¿Qué vamos a programar hoy?</div>
    </div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="Escribe tu petición aquí..." onkeypress="if(event.key === 'Enter') enviarMensaje()">
        <button id="send-btn" onclick="enviarMensaje()">Enviar</button>
    </div>
    <script>
        // ⚠️ REEMPLAZA ESTO CON TU URL DE NGROK (ej. https://1234-abcd.ngrok-free.app)
        const NGROK_URL = "https://TU_URL_DE_NGROK.ngrok-free.app"; 
        let historial = [];

        // ¡ESTA ERA LA FUNCIÓN QUE FALTABA!
        function agregarMensajeUI(rol, texto) {
            const chatContainer = document.getElementById("chat-container");
            const div = document.createElement("div");
            div.className = "mensaje " + rol;
            div.innerText = texto; // Usamos innerText para que no interprete HTML en tu pregunta
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function enviarMensaje() {
            const input = document.getElementById("user-input");
            const mensaje = input.value.trim();
            if (!mensaje) return;

            // Mostramos el mensaje del usuario en la interfaz
            agregarMensajeUI("user", mensaje);
            
            // Bloqueamos el input mientras responde
            input.value = "";
            input.disabled = true;
            document.getElementById("send-btn").disabled = true;

            // Creamos el contenedor para la respuesta de la IA
            const chatContainer = document.getElementById("chat-container");
            const divRespuesta = document.createElement("div");
            divRespuesta.className = "mensaje assistant";
            chatContainer.appendChild(divRespuesta);

            try {
                const response = await fetch(`${NGROK_URL}/chat`, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "ngrok-skip-browser-warning": "true" // ⚠️ Esto evita que Ngrok bloquee la conexión
                    },
                    body: JSON.stringify({
                        historial: historial,
                        nuevo_mensaje: mensaje
                    })
                });

                if (!response.ok) {
                    throw new Error("Error en el servidor");
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let textoCompleto = "";

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    textoCompleto += chunk;
                    
                    // Formatear el texto en tiempo real
                    divRespuesta.innerHTML = formatearTexto(textoCompleto);
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }

                // Guardamos en el historial para que la IA tenga memoria
                historial.push({ role: "user", content: mensaje });
                historial.push({ role: "assistant", content: textoCompleto });

            } catch (error) {
                console.error(error);
                divRespuesta.innerHTML = "<span style='color:#ff6b6b;'>❌ Error de conexión. ¿Está Ngrok encendido y actualizaste la URL?</span>";
            }

            // Desbloqueamos el input
            input.disabled = false;
            document.getElementById("send-btn").disabled = false;
            input.focus();
        }

        function formatearTexto(texto) {
            // 1. Formatear etiquetas de <pensamiento>
            let html = texto.replace(/<pensamiento>([\s\S]*?)(<\/pensamiento>|$)/g, '<div class="pensamiento">$1</div>');

            // 2. Formatear bloques de código con el botón de copiar
            html = html.replace(/```(\w*)\n([\s\S]*?)(```|$)/g, function(match, lenguaje, codigo) {
                const langLabel = lenguaje ? lenguaje : "código";
                // Escapar caracteres HTML en el código para evitar que se rendericen
                const codigoEscapado = codigo.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                
                return `
                <div class="code-container">
                    <div class="code-header">
                        <span>${langLabel}</span>
                        <button class="copy-btn" onclick="copiarCodigo(this)">Copiar</button>
                    </div>
                    <pre><code>${codigoEscapado}</code></pre>
                </div>`;
            });

            // 3. Formatear saltos de línea normales
            return html.replace(/\n/g, "<br>").replace(/<br><div/g, "<div").replace(/<\/div><br>/g, "</div>");
        }

        // Función global para copiar el texto
        window.copiarCodigo = function(boton) {
            const bloqueCodigo = boton.parentElement.nextElementSibling.querySelector('code');
            const textoCodigo = bloqueCodigo.innerText; 

            navigator.clipboard.writeText(textoCodigo).then(() => {
                const textoOriginal = boton.innerText;
                boton.innerText = "¡Copiado!";
                boton.classList.add("copied");
                
                setTimeout(() => {
                    boton.innerText = textoOriginal;
                    boton.classList.remove("copied");
                }, 2000);
            });
        };
    </script>
</body>
</html>
